<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHOOL JBV VIP | استعلام النتيجة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
        }

        body { 
            margin: 0; min-height: 100vh; 
            font-family: 'Cairo', sans-serif; color: #ffffff;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px;
            width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        input { 
            width: 100%; padding: 18px; margin: 15px 0;
            background: rgba(0,0,0,0.3); border: 2px solid transparent;
            border-radius: 15px; color: white; text-align: center;
            font-size: 1.1rem; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button { 
            width: 100%; padding: 18px; background: var(--primary);
            border: none; border-radius: 15px; color: white; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            transition: 0.4s;
        }

        button:hover { background: #4f46e5; transform: translateY(-3px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-container { margin-top: 30px; animation: fadeIn 0.6s ease-out; }
        
        #resultImg { 
            width: 100%; max-height: 400px; 
            object-fit: contain; border-radius: 20px; 
            display: none; border: 3px solid rgba(255,255,255,0.1);
        }

        #downloadBtn {
            display: none; margin-top: 15px; padding: 15px; 
            background: #10b981; color: white; text-decoration: none; 
            border-radius: 15px; font-weight: bold; width: 100%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>استعلام النتيجة</h2>
        <input type="text" id="idInput" placeholder="أدخل الرقم القومي (14)" maxlength="14">
        <button onclick="checkData()">عرض النتيجة</button>
        
        <div class="result-container" id="resBox" style="display: none;">
            <img id="resultImg" src="" alt="نتيجة">
            <a id="downloadBtn" href="#" download="النتيجة.jpg">تحميل الصورة</a>
            <p id="statusMsg"></p>
        </div>
    </div>

    <script>
        function checkData() {
            let id = document.getElementById('idInput').value;
            let img = document.getElementById('resultImg');
            let btn = document.getElementById('downloadBtn');
            let resBox = document.getElementById('resBox');
            let msg = document.getElementById('statusMsg');

            // تأكد من تطابق أسماء الصور هنا مع الأسماء المرفوعة على GitHub بالضبط
            const database = {
                "12345678901234": "IMG-20260522-WA0004.jpg",
                "11111111111111": "IMG-20260522-WA0005.jpg"
            };

            if (id.length !== 14) { alert("يرجى إدخال 14 رقماً"); return; }

            resBox.style.display = "block";

            if (database[id]) {
                img.src = database[id];
                btn.href = database[id];
                img.style.display = "block";
                btn.style.display = "block";
                msg.innerText = "✓ تم العثور على النتيجة";
                msg.style.color = "#10b981";
            } else {
                img.style.display = "none";
                btn.style.display = "none";
                msg.innerText = "✕ عذراً، الرقم غير مسجل";
                msg.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
