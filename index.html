<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>استعلام النتائج</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  body {
    background: #000;
    color: #ffffff;
    overflow-x: hidden;
  }

.intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
    display: flex;
    pointer-events: none;
  }

.intro-right,.intro-left {
    width: 50%;
    height: 100%;
    background: #000;
    border-right: 2px solid #c9a227;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
  }

.intro-left {
    border-right: none;
    border-left: 2px solid #c9a227;
  }

.intro-right.active { transform: translateX(-100%); }
.intro-left.active { transform: translateX(100%); }

.intro-text {
    color: #c9a227;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 20px #c9a227;
    animation: glow 1.5s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

.header {
    background: #f2c419;
    color: #000;
    padding: 10px 0;
    font-weight: bold;
    font-size: 14px;
    overflow: hidden;
    white-space: nowrap;
    width: 100%;
  }

.marquee {
    display: inline-block;
    animation: scroll-right 15s linear infinite;
  }

  @keyframes scroll-right {
    0% {
      transform: translateX(-100%);
    }
    100% {
      transform: translateX(100%);
    }
  }

.container {
    width: 100%;
    padding: 15px 10px;
    opacity: 0;
    animation: fadeIn 0.5s 1.3s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

.search-box {
    border: 2px solid #c9a227;
    border-radius: 12px;
    padding: 18px 12px;
    margin-bottom: 15px;
  }

.title {
    color: #c9a227;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 6px;
  }

.subtitle {
    color: #c9a227;
    font-size: 12px;
    text-align: center;
    margin-bottom: 15px;
  }

  select, input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #000;
    border: 2px solid #333;
    border-radius: 8px;
    color: #ffffff;
    font-size: 15px;
    text-align: center;
  }

.btn {
    width: 100%;
    padding: 12px;
    background: #c9a227;
    color: #000;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }

.result-box {
    border: 2px solid #c9a227;
    border-radius: 12px;
    padding: 12px 8px;
    display: none;
    margin-top: 15px;
  }

.result-title {
    color: #f2c419;
    font-size: 22px;
    text-align: center;
    margin-bottom: 15px;
    font-weight: bold;
}

.student-name {
    background: transparent;
    padding: 10px 0;
    margin-bottom: 15px;
    font-weight: bold;
    color: #f2c419;
    font-size: 18px;
    text-align: center;
}

.label-white {
    color: #ffffff;
}

.section-title {
    background: #c9a227;
    color: #000;
    padding: 9px;
    text-align: center;
    font-weight: bold;
    margin: 12px 0 0 0;
    font-size: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 10px;
  }

  table th {
    background: #c9a227;
    color: #000;
    padding: 8px 3px;
    text-align: center;
    font-weight: bold;
    border: 1px solid #000;
  }

  table td {
    background: #000;
    padding: 8px 3px;
    text-align: center;
    border: 1px solid #333;
    color: #ffffff;
  }

  table td.subject-name {
    color: #f2c419;
    font-weight: bold;
    text-align: right;
  }

  table.gold-row {
    background: #c9a227;
    color: #000;
    font-weight: bold;
  }

.btn-print {
    width: 100%;
    padding: 12px;
    background: #c9a227;
    color: #000;
    border: none;
    border-radius: 25px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
  }

.not-found {
    color: #ff4444;
    text-align: center;
    padding: 20px;
    font-size: 16px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="intro-left" id="leftDoor">
    <div class="intro-text">بك</div>
  </div>
  <div class="intro-right" id="rightDoor">
    <div class="intro-text">مرحباً</div>
  </div>
</div>

<div class="header">
  <div class="marquee">
    تحياتي إدارة المدرسة......................
  </div>
</div>

<div class="container">
  <div class="search-box">
    <div class="title">استعلام النتائج</div>
    <div class="subtitle">مدرسة/ الشهيد احمد راضي الثانوية المشتركة</div>

    <select id="grade">
      <option>الصف الأول الثانوي</option>
      <option>الصف الثاني الثانوي (علمي)</option>
      <option>الصف الثاني الثانوي (أدبي)</option>
    </select>

    <input type="text" id="nationalId" placeholder="أدخل الرقم القومي" inputmode="numeric">

    <button class="btn" onclick="searchResult()">بحث</button>
  </div>

  <div class="result-box" id="resultBox"></div>
</div>

<script>

  function searchResult() {
    const nationalId = document.getElementById('nationalId').value.trim();
    const resultBox = document.getElementById('resultBox');

    if(nationalId === '') {
      alert('من فضلك أدخل الرقم القومي');
      return;
    }

    const student = studentsDB[nationalId];

    if(!student) {
      resultBox.innerHTML = '<div class="not-found">غير مسجل</div>';
      resultBox.style.display = 'block';
      return;
    }

    let basicRows = student.basic.map(row =>
      `<tr>
        <td class="subject-name">${row[0]}</td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
      </tr>`
    ).join('');

    let failRows = student.fail.map(row =>
      `<tr>
        <td class="subject-name">${row[0]}</td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
      </tr>`
    ).join('');

    let progRows = student.prog.map(row =>
      `<tr>
        <td class="subject-name">${row[0]}</td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
      </tr>`
    ).join('');

    resultBox.innerHTML = `
      <div id="certificate">
        <div class="result-title">بيان درجات: ${student.grade}</div>
        <div class="student-name"><span class="label-white">اسم الطالب:</span> ${student.name}</div>

        <div class="section-title">المواد الدراسية الأساسية</div>
        <table>
          <tr>
            <th>المادة</th>
            <th>تقييمات<br>(70)</th>
            <th>تحريري<br>(30)</th>
            <th>المجموع<br>(100)</th>
          </tr>
          ${basicRows}
          <tr class="gold-row">
            <td colspan="3">إجمالي مجموع المواد الأساسية</td>
            <td>${student.total}</td>
          </tr>
        </table>

        <div class="section-title">مواد النجاح والرسوب</div>
        <table>
          <tr>
            <th>المادة</th>
            <th>تقييمات<br>(28)</th>
            <th>تحريري<br>(12)</th>
            <th>المجموع<br>(40)</th>
          </tr>
          ${failRows}
        </table>

        <table>
          <tr>
            <th>المادة</th>
            <th>تقييمات<br>(28)</th>
            <th>تحريري<br>(12)</th>
            <th>المجموع<br>(40)</th>
          </tr>
          ${progRows}
        </table>

        <div class="section-title">الأنشطة التربوية</div>
        <table>
          <tr>
            <td class="subject-name">التربية الرياضية</td>
            <td colspan="3">---</td>
          </tr>
          <tr>
            <td class="subject-name">الأنشطة التربوية</td>
            <td colspan="3">---</td>
          </tr>
        </table>
      </div>

      <button class="btn-print" onclick="downloadImage()">🖨طباعة الشهاده </button>
    `;

    resultBox.style.display = 'block';
    resultBox.scrollIntoView({ behavior: 'smooth' });
  }

  function downloadImage() {
    const certificate = document.getElementById('certificate');

    html2canvas(certificate, {
      backgroundColor: '#000',
      scale: 2
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = 'شهادة_النتيجة.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  }
</script>
